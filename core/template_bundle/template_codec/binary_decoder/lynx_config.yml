compilerOptions:
  targetSdkVersion:
    description: Sets the engine version used across template encode, binary decode, and runtime initialization for compatibility checks. Higher versions enable newer codec and renderer paths such as CSS value parsing, CSS variables, page-data retention defaults, and Fiber gating, while lower versions keep legacy behavior.
    defaultValue: ''
    valueType: string
  templateDebugUrl:
    description: Sets the external debug-info URL attached to the generated Lepus or QuickJS bundle during encode and runtime initialization. When set, the runtime exposes this URL to the inspector and appends it to stack traces and JS error reports; when empty, no external debug-info URL is reported.
    defaultValue: ''
    valueType: string
  enableCSSExternalClass:
    description: Controls whether template compile metadata keeps support for external classes. When enabled, MetaFactory serializes the flag so downstream template and CSS stages can treat external classes as supported; when disabled, that capability flag is cleared.
    defaultValue: 'true'
    valueType: boolean
    since: '1.6'
  useLepusNG:
    description: Controls whether compile and encode choose the LepusNG runtime context instead of the legacy Lepus VM. When enabled, MetaFactory and `GetContextType()` switch source generation and runtime execution to the LepusNG path; when disabled, template execution stays on the legacy VM context.
    defaultValue: 'false'
    valueType: boolean
    since: '2.1'
    nameAs:
      member: enable_lepus_ng
    export: false
  enableCSSClassMerge:
    description: Controls how the CSS encoder and binary reader handle repeated class or id selectors while building style fragments. When enabled, duplicate selectors merge their declarations into one token; when disabled, later tokens replace earlier ones with the same selector key.
    defaultValue: 'false'
    valueType: boolean
    since: '2.1'
  enableRemoveCSSScope:
    description: Controls whether runtime component rendering removes the generated CSS scope when building virtual pages. When enabled, the page proxy skips scoped descendant-style isolation for component pages; when disabled, component CSS keeps the generated scope.
    defaultValue: 'false'
    valueType: boolean
  disableMultipleCascadeCSS:
    description: Controls whether the CSS encoder keeps cascade selectors with three or more selector levels. When enabled, the parser drops those multi-level cascade tokens during encode; when disabled, they remain in the encoded style output.
    defaultValue: 'false'
    valueType: boolean
    since: '2.0'
    versionOverrides:
      - minSDKVersion: LYNX_VERSION_2_0
        value: 'true'
  removeCSSParserLog:
    description: Controls whether compile metadata asks downstream CSS parsing stages to suppress parser diagnostics. When enabled, MetaFactory serializes a no-parser-log flag into compile options; when disabled, parser logging remains available.
    defaultValue: 'false'
    valueType: boolean
  trialOptions:
    description: Carries feature-trial metadata from compile input into template encode. When the target SDK enables this feature, MetaFactory decodes the trial payload and the binary writer serializes it for compatibility reads; otherwise the bundle omits this section.
    defaultValue: ''
    valueType: lepus::Value
    jsValueType: Record<string, unknown>
    codeGen:
      - NONE
    export: false
  debugInfoOutside:
    description: Controls whether LepusNG keeps function-level debug info as external debug metadata instead of only inline source metadata. When enabled, encode and runtime keep external debug records for inspector and JS error reporting; when disabled, only the basic inline debug payload is available.
    defaultValue: 'false'
    valueType: boolean
    since: '2.7'
    nameAs:
      member: lepusng_debuginfo_outside
  enableDynamicComponent:
    description: Controls whether template compile parses dynamic-component tags into component metadata and generated render code. When enabled, the parser records dynamic component definitions for runtime component loading; when disabled, those entries are not emitted into the bundle metadata.
    defaultValue: 'true'
    valueType: boolean
    since: '1.6'
    export: false
  enableCSSStrictMode:
    description: CSS Length should be <number> follows a unit. Under strict mode, invalid <length> values are dropped.
    defaultValue: 'false'
    valueType: boolean
    since: '1.6'
    author: zhongyr
    supportPlatform:
      - Android
      - HarmonyOS
      - iOS
  defaultOverflowVisible:
    description: Controls the default page-level overflow behavior applied during config decode. When enabled and targetSdkVersion is at least 2.0, decoded page config defaults overflow to visible; when disabled, page layout falls back to the legacy hidden-overflow default.
    defaultValue: 'true'
    valueType: boolean
    since: '1.6'
  enableCSSVariable:
    description: Controls whether CSS custom properties are encoded and decoded in the CSS reader pipeline. When enabled for targetSdkVersion at least 2.0, CSS variable tokens and their default-value payloads are preserved; when disabled, CSS values are treated as plain static values.
    defaultValue: 'true'
    valueType: boolean
    since: '2.0'
  implicitAnimation:
    description: Controls the default implicit-animation behavior exposed to page config on Darwin. When enabled, background and layer property changes keep implicit Core Animation actions by default; when disabled, layer updates disable implicit actions unless another animation path turns them back on.
    defaultValue: 'false'
    valueType: boolean
    since: '1.4'
    nameAs:
      member: default_implicit_animation
  enableRadon:
    description: Controls the compile-time architecture mode stored in template info for Radon-capable bundles. When enabled, MetaFactory marks the bundle as `RADON_MODE_RADON`; when disabled, it keeps the legacy DOM-diff mode for compatibility checks.
    defaultValue: 'false'
    valueType: boolean
    codeGen:
      - NONE
    export: false
  enableKeepPageData:
    description: Controls whether decoded page config keeps saved page data for render-page reuse. When enabled, page config turns on page-data retention and virtual pages can reuse mould data instead of rebuilding from scratch; when disabled, page data is not retained between renders.
    defaultValue: 'false'
    valueType: boolean
    since: '2.1'
    versionOverrides:
      - minSDKVersion: LYNX_VERSION_2_3
        value: 'true'
    bindMemberTo: enable_keep_page_data
  defaultDisplayLinear:
    description: Controls the default root layout mode applied during page-config decode. When enabled and targetSdkVersion is at least 2.2, decoded pages default to linear layout; when disabled, the root layout keeps the legacy default.
    defaultValue: 'true'
    valueType: boolean
    since: '2.2'
  enableLynxAir:
    description: Controls whether compile metadata and decoded page config expose LynxAir support to runtime and reporting. When enabled, MetaFactory marks the bundle as LynxAir-capable and config decode forwards that capability into `PageConfig`; when disabled, LynxAir support stays off.
    defaultValue: 'false'
    valueType: boolean
    since: '2.3'
    export: false
  enableCSSLazyDecode:
    description: Controls whether CSS fragments are decoded lazily in the template binary reader. When enabled, the reader defers CSS fragment decoding until they are needed; when disabled, CSS is decoded eagerly during descriptor parsing. When unset, runtime falls back to the disable_lazy_css_decode experiment setting.
    defaultValue: FE_OPTION_UNDEFINED
    valueType: FeOption
    jsValueType: boolean
    nameAs:
      member: enable_lazy_css_decode
  enableEventRefactor:
    description: Controls the event-refactor path written into page config before runtime starts. When enabled, or left unset, the decoder turns on the refactored event behavior; when disabled, runtime falls back to the legacy event path.
    defaultValue: FE_OPTION_UNDEFINED
    valueType: FeOption
    jsValueType: boolean
    since: '2.5'
  forceCalcNewStyle:
    description: Controls whether page config forces the Radon runtime to recalculate styles instead of using CSS invalidation and cached style diffs. When enabled, nodes rebuild style state on updates; when disabled, Radon can reuse invalidation results and cached styles.
    defaultValue: FE_OPTION_UNDEFINED
    valueType: FeOption
    jsValueType: boolean
    author: DragonDragonDDD
    since: '2.6'
  enableCSSAsyncDecode:
    description: Controls whether CSS fragments are decoded on a concurrent thread after the CSS descriptor is parsed. When enabled, the binary reader schedules asynchronous CSS fragment decode and treats CSS loading as lazy; when disabled, CSS decoding stays on the synchronous reader path.
    defaultValue: FE_OPTION_UNDEFINED
    valueType: FeOption
    jsValueType: boolean
    nameAs:
      member: enable_async_css_decode
  enableCSSEngine:
    description: Controls whether compile options bind the dedicated CSS-engine flag into runtime config. When enabled, generated page config carries the CSS engine switch for downstream style parsing and resolution; when disabled, runtime keeps the legacy flag state.
    defaultValue: 'true'
    valueType: boolean
    bindMemberTo: enable_css_engine
  enableComponentConfig:
    description: Controls whether template metadata carries component-config support into runtime decode. When enabled, generated bundles can expose component config records such as extra-data removal and component-element removal; when disabled, that component-config feature flag is off.
    defaultValue: 'false'
    valueType: boolean
    since: '2.6'
  lynxAirMode:
    description: Controls which LynxAir architecture mode compile and runtime use for the bundle. MetaFactory uses this value to choose the arch option and validate Fiber compatibility, and runtime readers use the decoded mode to switch Air-specific decode or execution behavior; `AIR_MODE_OFF` keeps the non-Air path.
    defaultValue: AIR_MODE_OFF
    valueType: uint8_t
    jsValueType: CompilerOptionAirMode
    since: '2.11'
    export: false
  enableFiberArch:
    description: Controls whether template encode and decode switch from the Radon path to the Fiber architecture path. When enabled, MetaFactory validates the SDK gate, the encoder reads Fiber CSS sources, and runtime uses Fiber-specific bundle and page-config behavior; when disabled, templates stay on the Radon path.
    defaultValue: 'false'
    valueType: boolean
    since: '2.8'
  enableFlexibleTemplate:
    description: Controls whether the template binary uses the flexible-template body format instead of the legacy section layout. When enabled, the writer emits the flexible template body and the decoder reads that format; when disabled, encode and decode stay on the legacy non-flexible template layout. Fiber and Air arch paths force this on.
    defaultValue: 'false'
    valueType: boolean
    since: '2.8'
  enableCSSSelector:
    description: Controls whether compile, CSS encode, and CSS decode keep the Blink-style CSS selector module. When enabled, the parser and binary CSS reader preserve selector tokens for selector matching and invalidation; when disabled, selector parsing stays on the legacy non-selector path.
    defaultValue: 'false'
    valueType: boolean
    since: '2.8'
  enableReuseContext:
    description: Controls whether compile metadata marks LepusNG pages as eligible to reuse a runtime context between the page and dynamic components. When enabled, MetaFactory serializes the reuse-context capability into compile options; when disabled, downstream runtime keeps treating contexts as non-reusable.
    defaultValue: 'false'
    valueType: boolean
    since: '2.18'
    bindMemberTo: enable_reuse_context
    export: false
  enableCSSInvalidation:
    description: Controls whether CSS fragments build selector invalidation data alongside CSS selector rules. When enabled, the CSS reader creates RuleInvalidationSet data and Radon can invalidate affected styles incrementally; when disabled, selector matching skips invalidation metadata and style updates fall back to broader recalculation.
    defaultValue: 'false'
    valueType: boolean
    since: '2.10'
  enableAirRawCSS:
    description: Controls whether the Air encode path writes raw parsed CSS values instead of preprocessed style values into the binary. When enabled, `TemplateBinaryWriter` stores the original parsed value maps for Air pages; when disabled, encode writes the processed CSS representation.
    defaultValue: 'true'
    valueType: boolean
    export: false
  experimental_encodeQuickjsBytecode:
    description: Controls whether the encoder writes QuickJS bytecode into the JS section instead of serializing JS source text. When enabled, the binary writer emits JS bytecode; when disabled, it writes source code strings. The experimental path is intended to be gated by a sufficiently high target SDK.
    defaultValue: 'false'
    valueType: boolean
    since: '2.12'
    bindMemberTo: encode_quickjs_bytecode_
  enableLepusChunkAsyncDecode:
    description: Controls whether binary decode schedules Lepus chunk deserialization asynchronously instead of decoding the whole chunk on the reader thread. When enabled, `TemplateBinaryReader` concurrently decodes function chunks and waits later; when disabled, Lepus chunk decoding stays synchronous.
    defaultValue: 'false'
    valueType: boolean
    nameAs:
      member: enable_async_lepus_chunk_decode
    export: false
  enableSimpleStyling:
    description: Controls whether encode and decode use the SimpleStyle path for style objects, keyframes, and font faces. When enabled, MetaFactory collects `styleObjects`, the writer emits simple-style sections, and runtime installs simple-style keyframes and font faces; when disabled, those sections are skipped.
    defaultValue: 'false'
    valueType: boolean
    since: '3.3'
  enableOptLepusBytecode:
    description: Controls whether the encoder asks the Lepus VM to generate optimized bytecode instead of the default bytecode form. When enabled and targetSdkVersion is at least 3.8, encode turns on SetOptBytecode; when disabled, or below that SDK gate, the VM emits the normal bytecode path.
    defaultValue: 'false'
    valueType: boolean
    since: '3.8'
  bundleModuleMode:
    description: Carries the compile-time bundle module mode string into template metadata and page config for JS runtime startup. When set, MetaFactory serializes the mode and runtime forwards it to `loadApp`; when empty, runtime uses its default module-mode handling.
    defaultValue: ''
    valueType: string
    codeGen:
      - NONE
    export: false
  enableLepusDebug:
    description: Controls whether encode writes Lepus debug metadata into the generated context binary. When enabled, `Encoder` and `ContextBinaryWriter` keep extra debug records for inspector and runtime diagnostics; when disabled, that debug payload is omitted.
    defaultValue: 'false'
    valueType: boolean
    codeGen:
      - NONE
    export: false
  enableParallelElement:
    description: Controls whether compile metadata marks Fiber pages as using the parallel-element scheduler path. When enabled, MetaFactory records the parallel-element capability and forces the related Fiber CSS parser support; when disabled, bundles keep the normal element scheduling path.
    defaultValue: 'false'
    valueType: boolean
    codeGen:
      - NONE
    export: false
  silence:
    description: Controls whether the encoder suppresses progress and diagnostic logging while building the template binary. When enabled, encode and binary-writer logging stays quiet; when disabled, normal encode logs can be emitted.
    defaultValue: 'false'
    valueType: boolean
    codeGen:
      - NONE
    export: false
  enableTTForFullVersion:
    description: Controls whether source generation emits the full-version `$ttForRenderList` helper for LepusNG `tt:for` templates. When enabled, source generation adds that helper for pages that use `tt:for`; when disabled, the bundle keeps the older helper path.
    defaultValue: 'false'
    valueType: boolean
    codeGen:
      - NONE
    export: false
  enableDataSetAttrs:
    description: Controls whether template compile synthesizes a `dataset` object from `data-*` attributes in addition to keeping the raw attributes. When enabled, the parser adds the aggregated `dataset` payload to element attributes; when disabled, runtime only sees the original `data-*` attrs.
    defaultValue: 'false'
    valueType: boolean
    codeGen:
      - NONE
    export: false
  skipEncode:
    description: Controls whether the encoder stops after TTML parse instead of writing a binary template. When enabled, `Encoder` returns after parse and skips binary generation; when disabled, parse continues into the normal binary encode path.
    defaultValue: 'false'
    valueType: boolean
    codeGen:
      - NONE
    export: false
  enableSSR:
    description: Controls whether the encoder appends SSR metadata offsets after the main binary sections. When enabled, the binary writer emits the SSR trailer; when disabled, no SSR suffix is written.
    defaultValue: 'false'
    valueType: boolean
    codeGen:
      - NONE
    export: false
  enableCursor:
    description: Controls whether the encoder appends cursor-offset metadata after the main binary sections. When enabled, the binary ends with cursor offsets for cursor-based consumption; when disabled, that suffix is omitted.
    defaultValue: 'false'
    valueType: boolean
    codeGen:
      - NONE
    export: false
  closureFix:
    description: Controls whether compile and VM execution enable the Lepus closure-fix behavior. When enabled, source generation wraps preprocess helpers differently and runtime bytecode execution turns on closure-fix semantics; when disabled, compile and runtime keep the older closure behavior.
    defaultValue: 'true'
    valueType: boolean
    codeGen:
      - NONE
    export: false
  enableConcurrentElement:
    description: Controls whether compile metadata marks Fiber pages as eligible for concurrent-element scheduling. When enabled, MetaFactory treats it as the parallel-element capability and records the scheduler flag in template info; when disabled, that capability stays off.
    defaultValue: 'false'
    valueType: boolean
    codeGen:
      - NONE
    export: false
  contextType:
    description: Selects the numeric template execution context stored in compile options. MetaFactory ingests the value and `GetContextType()` uses it to choose a specific runtime engine; `0` keeps the default context choice unless another compile option selects LepusNG.
    defaultValue: '0'
    valueType: uint8_t
    jsValueType: number
    since: '3.8'
    export: false
  enableKeyframeCustomPropertyDeclaration:
    description: Controls whether CSS encode and decode preserve custom property declarations inside `@keyframes`. When enabled, the writer serializes keyframe custom-property payloads and the CSS reader restores them; when disabled, custom-property declarations inside keyframes are skipped.
    defaultValue: 'false'
    valueType: boolean
    since: '3.9'
    export: false
# compiler options end here

# PageConfig start here
extraInfo:
  description: Carries user-defined `extraInfo` through config decode into `PageConfig` and script-visible config state. When set, the manual binary config decoder stores the `lepus::Value` payload on the page config; when omitted, no extra info object is attached.
  defaultValue: ''
  valueType: lepus::Value
  jsValueType: Record<string, unknown>
  syncTo:
    - script
  codeGen:
    - MEMBER
    - SETTER
    - GETTER
  nameAs:
    const: kUserDefinedExtraInfo
  author: nhsprite
  since: '2.8'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
customCSSInheritanceList:
  description: Custom Inheritable CSS Properties
  defaultValue: ''
  valueType: std::unordered_set<CSSPropertyID>
  jsValueType: string[]
  bindMemberTo: css_configs_.custom_inherit_list_
  codeGen:
    - SETTER
    - GETTER
  nameAs:
    setter: SetCustomCSSInheritList
    getter: GetCustomCSSInheritList
  author: ShouruiSong
  since: '1.6'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
version:
  description: Carries the deprecated frontend page-version string from config decode into runtime reporting and platform bridges. When set, `PageConfig` forwards it to Android or iOS config info and event tracking; when empty, runtime reports no page version.
  defaultValue: ''
  valueType: string
  nameAs:
    member: page_version
  author: nhsprite
  deprecated: '3.5'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
cli:
  description: cli version
  defaultValue: ''
  valueType: string
  nameAs:
    member: cli_version
    setter: SetCliVersion
    getter: GetCliVersion
    const: kCliVersion
  author: nhsprite
  deprecated: '3.5'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
reactVersion:
  description: Carries the deprecated React version string from config decode into platform config info and performance reporting. When set, Android and iOS bridges expose it in config-info payloads and perf metrics; when empty, no React version is reported.
  defaultValue: ''
  valueType: string
  author: Yradex
  since: '2.1'
  deprecated: '3.5'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
customData:
  description: Carries the deprecated custom-data JSON string from config decode into platform config info and behavior registries. When set, Android, iOS, and Harmony bridges expose the string to platform-side consumers; when empty, no customData payload is forwarded.
  defaultValue: ''
  valueType: string
  author: nhsprite
  deprecated: '3.5'
debugMetadataUrl:
  description: Debug metadata URL for template diagnostics.
  defaultValue: ''
  valueType: string
  author: songshourui.null
  since: '3.8'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
tapSlop:
  description: Controls the movement threshold used by platform gesture recognizers before a tap is canceled. When pointer movement exceeds this distance, Android or Harmony tap handling no longer treats the interaction as a tap; smaller movement keeps the tap path eligible.
  defaultValue: 50px
  valueType: string
  author: rAY-ooo
  since: '2.0'
  supportPlatform:
    - Android
    - HarmonyOS
preferredFps:
  description: Controls the preferred frame-rate mode requested for animation-driven frame callbacks. `ElementManager` forwards this string to `ElementVsyncProxy`, so values such as `high`, `low`, or `auto` change the vsync cadence used while CSS animations request frames.
  defaultValue: auto
  valueType: string
  author: YellowFishWyfCPP
  since: '3.0'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
quirksMode:
  description: Controls the layout compatibility version used by manual config decode for legacy CSS behavior. During decode, boolean or version-string input is converted to a `base::Version` and written into layout configs; older compatibility versions keep legacy layout quirks while newer or default values follow target-SDK behavior.
  defaultValue: base::Version(1, 5)
  valueType: base::Version
  jsValueType: 'boolean | string'
  codeGen:
    - NONE
  author: givemefive9
  since: '1.4'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableLynxScrollFluency:
  description:
    Force report lynx scroll fluency event. When setting pageConfig.enableLynxScrollFluency
    to a double value in the range [0, 1], we will monitor the fluency metrics for
    this LynxUI based on this probability. The probability indicates the likelihood
    of enabling fluency monitoring, and the metrics will be reported unconditionally
    through the applogService.
  defaultValue: '-1'
  valueType: double
  jsValueType: boolean | number
  syncTo:
    - script
  codeGen:
    - MEMBER
  nameAs:
    member: enable_scroll_fluency_monitor
  author: Tamerlx
  since: '2.15'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
lepusGCThreshold:
  description:
    GC threshold of lepusNG. Let default value be 256, and the unit is
    KB.
  defaultValue: '256'
  valueType: int64_t
  jsValueType: number
  author: ShouruiSong
  since: '2.9'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
  export: false
pipelineSchedulerConfig:
  description:
    Scheduler config for pipeline, including enableParallelElement/list-framework
    batch render and other scheduler config.
  defaultValue: '0'
  valueType: uint64_t
  jsValueType: number
  readNative: true
  author: usczz
  since: '3.1'
  supportPlatform:
    - Android
    - iOS
redBoxImageSizeWarningThreshold:
  description: Carries the deprecated iOS image-size warning threshold from config decode into UI context. When a decoded image exceeds this threshold, iOS red-box diagnostics can warn; when absent, the default warning threshold is used.
  defaultValue: '1000000'
  valueType: uint32_t
  jsValueType: number
  nameAs:
    member: log_box_image_size_warning_threshold
    setter: SetLogBoxImageSizeWarningThreshold
    getter: GetLogBoxImageSizeWarningThreshold
    const: kLogBoxImageSizeWarningThreshold
  author: pilipala195
  deprecated: '3.5'
lepusQuickjsStacksize:
  description: Controls the virtual stack size applied to LepusNG QuickJS contexts on iOS. When set above zero, `QuickContext::ApplyConfig()` applies that stack limit; when zero, QuickJS keeps the system default stack size.
  defaultValue: '0'
  valueType: uint32_t
  jsValueType: number
  nameAs:
    member: lepus_quickjs_stack_size
    setter: SetLepusQuickjsStackSize
    getter: GetLepusQuickjsStackSize
  author: zys777
  since: '2.2'
  supportPlatform:
    - iOS
  export: false
observerFrameRate:
  description: Specifies the frequency of exposure detection.
  defaultValue: '20'
  valueType: int32_t
  jsValueType: number
  author: rAY-ooo
  since: '2.5'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
longPressDuration:
  description: Controls the platform long-press timeout before Lynx fires a `longpress` event. Smaller values make long-press recognition fire sooner, while the default or negative handling keeps the platform timeout behavior.
  defaultValue: '-1'
  valueType: int32_t
  jsValueType: number
  author: rAY-ooo
  since: '2.8'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
useNewImage:
  description: Controls the deprecated page-level ternary switch that forwards image loading to the newer image pipeline on Android and iOS. When explicitly true or false, the decoded value is exported to platform `PageConfig`; when unset, platform code falls back to newer native flags such as `enableNewImage` or `trailNewImage`.
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  author: liubb0516
  deprecated: '3.5'
  supportPlatform:
    - Android
    - iOS
enableTextBoringLayout:
  description: Controls whether Android text measurement can use the BoringLayout fast path for eligible plain text. When enabled, simple text may use BoringLayout; when disabled, text stays on the general layout path.
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  author: Randycn
  since: '2.17'
  supportPlatform:
    - Android
enableTextLayerRender:
  description: Controls whether iOS text renders through the dedicated text-layer path. When enabled, LynxUIText uses layer-based text rendering; when disabled, text stays on the legacy view-backed rendering path.
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  author: Randycn
  since: '2.3'
  supportPlatform:
    - iOS
enableUseMapBuffer:
  description: Controls whether UI props and style payloads are stored in MapBuffer instead of the legacy map container. When enabled, fragments and prop bundles can read MapBuffer-backed data; when disabled, runtime keeps the older prop container path. When unset, it falls back to LynxEnv.
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  readNative: true
  author: nhsprite
  since: '2.14'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableFiberElementForRadonDiff:
  description: Deprecated compatibility field kept so older page configs can still decode a FiberElement-for-RadonDiff flag. Current repo-local runtime no longer branches on this field directly.
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  author: DragonDragonDDD
  readNative: false
  since: '3.0'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
  export: false
  deprecated: '3.7'
  codeGen:
    - NONE
enableOptPushStyleToBundle:
  description: Controls the deprecated style-to-PropBundle optimization flag applied after config decode. When enabled, `ElementManager` turns on the optimized push-style path; when disabled, style payloads keep the older path. When unset, runtime falls back to `LynxEnv`.
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  author: ShouruiSong
  readNative: true
  deprecated: '3.5'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableTextLayoutCache:
  description: Controls whether text layout results can be reused from the text renderer cache. When enabled, text shadow nodes can reuse cached renderers for repeated layout specs; when disabled, text layout is recomputed each time. When unset, platform env can still provide the value.
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  author: Randycn
  since: '3.3'
  supportPlatform:
    - Android
    - iOS
enableUnifiedPipeline:
  description: Controls whether runtime enables the unified pixel pipeline after page config is decoded. When true, TemplateAssembler turns on the unified pixel pipeline context and render completion goes through the unified resolve path; when false, it keeps the legacy patch-finish pipeline. When unset, it falls back to the native config source.
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  author: nhsprite
  readNative: true
  since: '3.4'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableUseContextPool:
  description: Controls whether LepusNG context creation first tries pooled MTS runtimes instead of constructing a fresh runtime immediately. When true, TemplateEntry reuses local or global context pools and template bundles can prefill a local pool; when false, runtime skips pooled reuse and creates a new context directly. When unset, it falls back to LynxEnv.
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  codeGen:
    - MEMBER
    - SETTER
    - DECODE
  author: nhsprite
  since: '2.14'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableCSSLazyImport:
  description:
    Under scoped CSS, the imported CSS declarations by import rules are
    lazily decoded at the first time the scope takes effect.
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  codeGen:
    - MEMBER
    - SETTER
    - DECODE
  author: zhongyr
  since: '2.18'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableNewAnimator:
  description: Controls whether element updates use Lynx's new animator path instead of relying on platform animation behavior. When enabled, page config turns on the new animator for element and Fiber animation branches; when disabled, runtime falls back to platform animation handling. When unset, it falls back to `LynxEnv`.
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  codeGen:
    - MEMBER
    - SETTER
    - DECODE
  author: YellowFishWyfCPP
  since: '2.18'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableComponentAsyncDecode:
  description: Controls whether async-loaded dynamic components are decoded on child threads before they are delivered to TASM. When enabled, TemplateAssembler passes the flag to the component loader so async component bundles decode off the main path; when disabled, component decode stays on the normal delivery path. When unset, it can still fall back to LynxEnv.
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  codeGen:
    - MEMBER
    - SETTER
    - DECODE
  author: nhsprite
  since: '2.14'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableSignalAPI:
  description: Controls whether MTS runtimes register Lynx's native Signal API for the page. When true, page config passes the signal flag into runtime creation and MTS runtime registration exposes signal support to the VM; when false, that signal registration is skipped. When unset, it falls back to the native config source.
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  readNative: true
  author: ShouruiSong
  since: '3.1'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableNativeScheduleCreateViewAsync:
  description: Controls whether Android painting context schedules native `CreatePaintingNode` work asynchronously instead of executing creation immediately. When enabled, `ElementManager` forwards the flag and `PaintingContextAndroid` enqueues async create-view work; when disabled, create-node work stays synchronous. When unset, it falls back to `LynxEnv`.
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  readNative: true
  author: ShouruiSong
  deprecated: '3.5'
  supportPlatform:
    - Android
enableNativeList:
  description: Controls whether list rendering prefers the native C++ list implementation instead of the older platform list path. When enabled, list elements resolve to native-list mode in shell or page config; when disabled, runtime keeps the legacy platform implementation. When unset, native config can still decide the flag.
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  readNative: true
  author: DwwWxx
  since: '3.2'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
trailNewImage:
  description: Controls whether iOS turns on the refactored image implementation exposed through trailUseNewImage. When enabled, the iOS UI context uses the newer image pipeline; when disabled, it stays on the legacy image implementation. When unset, it falls back to native config.
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  readNative: true
  author: liubb0516
  since: '2.6'
  supportPlatform:
    - iOS
asyncRedirect:
  description: Controls whether Android image URL redirection is resolved asynchronously before request dispatch. When enabled, image fetchers call asyncRedirectUrl; when disabled, they use the synchronous redirect path.
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  nameAs:
    member: async_redirect_url
    setter: SetAsyncRedirectUrl
    getter: GetAsyncRedirectUrl
  readNative: true
  author: liubb0516
  since: '2.6'
  supportPlatform:
    - Android
enableUIOperationOptimize:
  description: Controls whether ElementManager enables UI-operation batching for create-view and update work. When enabled, TemplateAssembler turns on UI operation batching and Android UI work can be grouped before flush; when disabled, runtime keeps the normal non-batched path. When unset, LynxEnv can still enable batching.
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  readNative: true
  author: nhsprite
  since: '2.16'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableMicrotaskPromisePolyfill:
  description: Controls whether the JS runtime installs Lynx's microtask-based Promise polyfill. When enabled, `TemplateEntry`, JS app startup, and `setup-promise.ts` turn on the polyfill path; when disabled, runtime keeps the existing Promise implementation. When unset, native config can still decide the flag.
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  readNative: true
  author: lybvinci
  since: '3.1'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
mapContainerType:
  description: set 0 is surface mapview, set 1 is texture mapview
  defaultValue: '0'
  valueType: uint8_t
  jsValueType: number
  author: AdrianLCA
  since: '3.2'
  supportPlatform:
    - Android
  export: false
flatten:
  description: Controls whether Android nodes can stay flattened without a backing platform `View` by default. When true, only nodes that need a real platform view create one; when false, nodes create corresponding Android views more eagerly.
  defaultValue: 'true'
  valueType: bool
  nameAs:
    member: page_flatten
    setter: SetGlobalFlattern
    getter: GetGlobalFlattern
  author: linxs0211
  since: '1.4'
  supportPlatform:
    - Android
implicit:
  description: Controls the deprecated global iOS implicit-animation default copied into UI config during page decode. When true, layer property changes keep implicit Core Animation actions; when false, iOS disables them by default. For target SDK 2.0 and above, the default override is false.
  defaultValue: 'true'
  valueType: bool
  versionOverrides:
    - minSDKVersion: LYNX_VERSION_2_0
      value: 'false'
  nameAs:
    member: page_implicit
    setter: SetGlobalImplicit
    getter: GetGlobalImplicit
  author: linxs0211
  since: '1.4'
  supportPlatform:
    - iOS
lepusStrict:
  description: Sets whether lepus/lepusng is run in strict mode
  defaultValue: 'false'
  valueType: bool
  nameAs:
    member: enable_lepus_strict_check
    setter: SetEnableLepusStrictCheck
    getter: GetEnableLepusStrictCheck
  author: zys777
  since: '1.4'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
  export: false
lepusNullPropAsUndef:
  description: Controls how Lepus property lookup represents missing object properties during code generation and runtime evaluation. When enabled, source generation and VM execution return `undefined` for absent properties; when disabled, the same lookup returns `null`. From target SDK 1.6 onward, the default override is enabled.
  defaultValue: 'false'
  valueType: bool
  versionOverrides:
    - minSDKVersion: LYNX_VERSION_1_6
      value: 'true'
  nameAs:
    member: enable_lepus_null_prop_as_undef
    setter: SetEnableLepusNullPropAsUndef
    getter: GetEnableLepusNullPropAsUndef
  author: zys777
  since: '1.6'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
  export: false
dataStrictMode:
  description:
    ReactLynx cannot opt top_level_variables used in lepus. So we cannot
    forbid updateData when variable not in top_level_variables. User can use this
    config to close the check.
  defaultValue: 'true'
  valueType: bool
  author: nhsprite
  since: '2.1'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableAsyncDisplay:
  description:
    Globally enable async rendering for software rendering contents on
    iOS, this can largely optimize the frame rate and reduce janks.
  defaultValue: 'true'
  valueType: bool
  author: zhongyr
  since: '2.1'
  deprecated: '3.5'
  supportPlatform:
    - iOS
enableImageDownsampling:
  description: Controls whether iOS image decoding downsamples large images before display. When enabled, `LynxUIImage` and the UI context use downsampling-aware decode paths; when disabled, images keep the normal full-resolution decode path.
  defaultValue: 'false'
  valueType: bool
  author: liubb0516
  since: '2.0'
  supportPlatform:
    - iOS
enableNewImage:
  description: Controls whether image loading uses the newer image-service pipeline. When enabled, the UI context turns on the new image loader; when disabled, image loading stays on the legacy service path.
  defaultValue: 'true'
  valueType: bool
  author: liubb0516
  since: '2.8'
  supportPlatform:
    - Android
    - iOS
enableTextNonContiguousLayout:
  description: Controls whether text layout allows noncontiguous layout on Darwin text renderers. When enabled, text renderers set allowsNonContiguousLayout for eligible text; when disabled, layout stays contiguous.
  defaultValue: 'true'
  valueType: bool
  author: Randycn
  since: '1.6'
  supportPlatform:
    - iOS
enableViewReceiveTouch:
  description: Controls whether iOS client-slide views continue receiving raw touch callbacks alongside Lynx gestures. When enabled, gesture recognizers stop canceling touches in view and touchesBegan or touchesEnded can still reach the platform view; when disabled, Lynx gestures keep canceling those raw touch callbacks.
  defaultValue: 'false'
  valueType: bool
  author: rAY-ooo
  since: '1.4'
  supportPlatform:
    - iOS
enableEventThrough:
  description: Controls whether touches on the root area can pass through the Lynx page instead of being consumed by Lynx. When enabled, root touch dispatch returns false and overlay or host views underneath can receive the event; when disabled, Lynx keeps normal touch consumption.
  defaultValue: 'false'
  valueType: bool
  author: rAY-ooo
  since: '1.4'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
removeComponentElement:
  description: deprecated
  defaultValue: 'false'
  valueType: bool
  nameAs:
    member: need_remove_component_element
  author: linxs0211
  since: '1.6'
  deprecated: '3.5'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
strictPropType:
  description: Controls how component prop type mismatches are handled during component property application. When enabled, `RadonComponent` falls back to the declared default value for mismatched props; when disabled, runtime keeps the older mismatch behavior.
  defaultValue: 'false'
  valueType: bool
  author: nhsprite
  since: '2.10'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
syncImageAttach:
  description: Controls the deprecated Android image-attach timing for starting requests from the main thread. When enabled and attach happens on the main thread, image requests start immediately; when disabled, request start is posted to the next main-thread frame.
  defaultValue: 'true'
  valueType: bool
  author: liubb0516
  since: '2.6'
  deprecated: '3.5'
  supportPlatform:
    - Android
useImagePostProcessor:
  description: Controls whether Android image requests run through the image post-processor path after load. When enabled, PageConfig marks image requests for post-processing; when disabled, images are delivered without that extra processing stage.
  defaultValue: 'false'
  valueType: bool
  author: liubb0516
  since: '2.7'
  supportPlatform:
    - Android
useNewSwiper:
  description: Controls whether Android pages create the newer x-swiper implementation instead of the deprecated legacy swiper. When enabled, pages use the new swiper path; when disabled, runtime can still create the legacy swiper and logs a deprecation warning.
  defaultValue: 'true'
  valueType: bool
  author: keweibing
  since: '1.6'
  supportPlatform:
    - Android
enableAsyncInitVideoEngine:
  description: Controls whether Android video engine initialization happens asynchronously instead of blocking the normal page init path. When enabled, video engine startup is deferred to an async init path; when disabled, runtime keeps synchronous initialization.
  defaultValue: 'false'
  valueType: bool
  nameAs:
    member: async_init_tt_video_engine
    setter: SetEnableAsyncInitTTVideoEngine
    getter: GetEnableAsyncInitTTVideoEngine
  author: AdrianLCA
  since: '2.6'
  supportPlatform:
    - Android
enableComponentLifecycleAlignWebview:
  description: Customize component lifecycle align webview when enable.
  defaultValue: 'false'
  valueType: bool
  author: pilipala195
  since: '2.2'
  supportPlatform:
    - Android
  export: false
enableListNewArchitecture:
  description: Controls whether list nodes are created through the newer Radon diff list architecture. When enabled, renderer functions can build RadonDiffListNode2 and decoder falls back to the settings value if the page omits it; when disabled, runtime keeps the older list architecture.
  defaultValue: 'false'
  valueType: bool
  nameAs:
    member: list_new_architecture
    setter: SetListNewArchitecture
    getter: GetListNewArchitecture
  readSettings: true
  author: keweibing
  since: '2.4'
  supportPlatform:
    - Android
    - iOS
enableNewListContainer:
  description: Implement the platform-level list based on scrollView on the IOS platform
  defaultValue: 'false'
  valueType: bool
  author: keweibing
  since: '2.13'
  supportPlatform:
    - iOS
enableListPlug:
  description: Controls whether list rendering enables the list plug path in Radon list platform info. When enabled, page config passes the plug flag into list nodes; when disabled, list nodes run without the plug behavior.
  defaultValue: 'false'
  valueType: bool
  nameAs:
    member: list_enable_plug
  author: keweibing
  since: '2.5'
  supportPlatform:
    - Android
    - iOS
enableListMoveOperation:
  description: Does diffResult have moveAction
  defaultValue: 'false'
  valueType: bool
  nameAs:
    member: list_enable_move_operation
  author: DragonDragonDDD
  since: '2.2'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableCreateViewAsync:
  description: Create Android platform UIs in lynx built-in thread-pool to optimize UI Operation Execution
  defaultValue: 'true'
  valueType: bool
  author: usczz
  since: '2.0'
  supportPlatform:
    - Android
enableVsyncAlignedFlush:
  description:
    Drive the execution of UI tasks in the pipeline according to the VSync
    signal, bringing a certain progressive rendering effect. It is suitable for scenarios
    where JS-driven updates are frequent. Turn it on as needed.
  defaultValue: 'false'
  valueType: bool
  author: Yellow5A5
  since:
    - Android: '2.11'
    - iOS: '3.2'
  supportPlatform:
    - Android
    - iOS
enableAccessibilityElement:
  description: Controls the default accessibility-element status for Android Lynx views. When enabled, views whose own a11y status is default inherit important-for-accessibility behavior from page config; when disabled, those views stay out of the default accessibility tree unless explicitly marked.
  defaultValue: 'true'
  valueType: bool
  author: DwwWxx
  since: '2.0'
  supportPlatform:
    - Android
enableOverlapForAccessibilityElement:
  description: Controls the deprecated Android accessibility overlap policy for Lynx accessibility elements. When enabled, `LynxAccessibilityNodeProvider` can expose overlapping Lynx nodes to accessibility; when disabled, overlap handling keeps the older filtered behavior.
  defaultValue: 'true'
  valueType: bool
  author: DwwWxx
  since: '2.3'
  deprecated: '3.5'
  supportPlatform:
    - Android
enableNewAccessibility:
  description: Controls the deprecated Android delegate-based accessibility implementation. When enabled, `LynxAccessibilityWrapper` prefers the newer accessibility delegate path; when disabled, accessibility stays on the older node-provider or helper path.
  defaultValue: 'false'
  valueType: bool
  author: DwwWxx
  since: '2.7'
  deprecated: '3.5'
  supportPlatform:
    - Android
enableNewLayoutOnly:
  description: Controls the deprecated extra page-config gate for layout-only optimization. When enabled, `ElementManager` combines this flag with TASM's layout-only switch before allowing layout-only nodes; when disabled, page config blocks that optimization even if TASM enables it.
  defaultValue: 'true'
  valueType: bool
  author: zhongyr
  deprecated: '3.5'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableReactOnlyPropsId:
  description: Controls whether React pages pass only `propsId` to the JS thread instead of cloning the full props object. When enabled and `propsId` exists, `PageProxy::ProcessReactPropsForJS()` sends only `propsId` plus the `$$onlyPropsId` marker; when disabled, JS receives the full props payload.
  defaultValue: 'false'
  valueType: bool
  author: colinaaa
  since: '2.2'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableGlobalComponentMap:
  description: Controls the deprecated Radon component-map scope used during component lookup and update. When enabled, `RadonComponent` reads and updates the page-global component map; when disabled, component bookkeeping stays on the per-component map path.
  defaultValue: 'false'
  valueType: bool
  author: DragonDragonDDD
  deprecated: '3.5'
enableTextRefactor:
  description: Controls whether text measurement and rendering use the refactored text path that is closer to web behavior. When enabled, text layout specs, baseline handling, and rich-text processing use the refactored rules; when disabled, text keeps the legacy Lynx behavior.
  defaultValue: 'false'
  valueType: bool
  versionOverrides:
    - minSDKVersion: LYNX_VERSION_2_2
      value: 'true'
  author: Randycn
  since: '2.2'
  supportPlatform:
    - Android
    - iOS
enableTextOverflow:
  description: Controls whether platform text renderers treat text overflow as visible instead of clipping to bounds. When enabled, page config forwards the flag to platform text contexts and iOS or Harmony text rendering allows visible overflow; when disabled, text keeps the older clipped overflow behavior. From target SDK 2.8 onward, the default override is enabled.
  defaultValue: 'false'
  valueType: bool
  versionOverrides:
    - minSDKVersion: LYNX_VERSION_2_8
      value: 'true'
  author: Randycn
  since: '2.8'
  supportPlatform:
    - Android
    - iOS
enableNewClipMode:
  description: Controls whether text and layout clipping use the newer clip-mode behavior. When enabled, text layout specs and UI context use the new clip mode; when disabled, clipping stays on the legacy behavior.
  defaultValue: 'true'
  valueType: bool
  versionOverrides:
    - minSDKVersion: LYNX_VERSION_2_10
      value: 'true'
  author: Randycn
  since: '2.10'
  supportPlatform:
    - Android
    - iOS
autoResumeAnimation:
  description: deprecated
  defaultValue: 'true'
  valueType: bool
  versionOverrides:
    - minSDKVersion: LYNX_VERSION_2_3
      value: 'true'
  nameAs:
    setter: SetGlobalAutoResumeAnimation
    getter: GetGlobalAutoResumeAnimation
  author: linxs0211
  deprecated: '3.5'
enableNewTransformOrigin:
  description: Controls whether iOS uses the newer transform-origin calculation for transforms and background positioning. When enabled, `LynxUI`, `LynxConverter+Transform`, and background handling use the new origin algorithm; when disabled, iOS keeps the legacy transform-origin math. From target SDK 2.6 onward, the default override is enabled.
  defaultValue: 'true'
  valueType: bool
  versionOverrides:
    - minSDKVersion: LYNX_VERSION_2_6
      value: 'true'
  nameAs:
    setter: SetGlobalEnableNewTransformOrigin
    getter: GetGlobalEnableNewTransformOrigin
  author: YellowFishWyfCPP
  since: '2.6'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableCircularDataCheck:
  description: Controls whether JS runtime checks for circular references when converting JS values into Lynx values. When enabled, `TemplateEntry` forwards the flag to BTS or JSI runtime and circular structures take the guarded conversion path; when disabled, conversions skip that extra circular-data check.
  defaultValue: 'true'
  valueType: bool
  nameAs:
    setter: SetGlobalCircularDataCheck
    getter: GetGlobalCircularDataCheck
  author: nhsprite
  since: '2.10'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableReduceInitDataCopy:
  description: Controls whether TTML init data passed to JS is reduced to `Object.keys(data)` instead of cloning the full object. When enabled, `PageProxy::ProcessInitDataForJS()` sends only non-nil keys for non-React pages; when disabled, JS receives the full init-data payload.
  defaultValue: 'false'
  valueType: bool
  author: nhsprite
  since: '2.6'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableSimultaneousTap:
  description: Controls whether iOS Lynx tap gestures can fire at the same time as outer native tap gestures. When enabled, LynxTap and host tap gestures are allowed to recognize together; when disabled, Lynx keeps the default mutual-exclusion behavior.
  defaultValue: 'false'
  valueType: bool
  author: rAY-ooo
  since: '2.8'
  supportPlatform:
    - iOS
enableComponentLayoutOnly:
  description: Controls the deprecated component-level gate for layout-only optimization. When enabled, component elements can return true from `CanBeLayoutOnly()` and skip backing views when other checks pass; when disabled, components keep real element nodes even if other layout-only conditions match.
  defaultValue: 'false'
  valueType: bool
  versionOverrides:
    - minSDKVersion: LYNX_VERSION_2_6
      value: 'true'
  author: linxs0211
  since: '2.5'
  deprecated: '3.5'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
extendedLayoutOnlyOpt:
  description:
    A config to force make some special properties can be used to layout
    only (such as direction&text-align,etc.).
  defaultValue: 'false'
  valueType: bool
  versionOverrides:
    - minSDKVersion: LYNX_VERSION_2_13
      value: 'true'
  nameAs:
    setter: SetEnableExtendedLayoutOpt
    getter: GetEnableExtendedLayoutOpt
  author: linxs0211
  since: '2.11'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableTouchRefactor:
  description: Controls whether iOS touch dispatch uses the refactored gesture-conflict path. When enabled, external gestures in possible or began state no longer cancel Lynx touch handling and touchend can complete normally; when disabled, the legacy cancellation behavior remains.
  defaultValue: 'true'
  valueType: bool
  author: rAY-ooo
  since: '2.8'
  supportPlatform:
    - iOS
enableEndGestureAtLastFingerUp:
  description: Controls whether iOS multi-finger touch handling ends only after the last finger is lifted. When enabled, the touch recognizer reports ended or cancelled when the final finger leaves; when disabled, the legacy earlier-ending behavior remains.
  defaultValue: 'false'
  valueType: bool
  author: rAY-ooo
  since: '2.9'
  supportPlatform:
    - iOS
disableLongpressAfterScroll:
  description: Prevent the long press event from being triggered during inertial scrolling.
  defaultValue: 'false'
  valueType: bool
  author: rAY-ooo
  since: '2.5'
  supportPlatform:
    - iOS
keyboardCallbackPassRelativeHeight:
  description:
    The outer decor view that wraps lynx view may change due to that virtual
    navigation bar is shielded or drawn. Change the returning value of keyboard event
    to return absolute keyboard height and the offset from keyboard to to lynx view
    bottom
  defaultValue: 'false'
  valueType: bool
  versionOverrides:
    - minSDKVersion: LYNX_VERSION_2_2
      value: 'true'
  nameAs:
    setter: SetKeyboardCallbackUseRelativeHeight
    getter: GetKeyboardCallbackUseRelativeHeight
  author: pilipala195
  since: '2.2'
  supportPlatform:
    - Android
enableCheckDataWhenUpdatePage:
  description: Controls the deprecated Radon page data-validation step before `updatePage` applies new data. When enabled, renderer functions set the flag on `RadonPage` and update-page checks whether incoming data actually changed; when disabled, that equality check is skipped.
  defaultValue: 'true'
  valueType: bool
  author: DragonDragonDDD
  deprecated: '3.5'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableBackgroundShapeLayer:
  description: Controls the deprecated iOS background-mask optimization that uses `CAShapeLayer` for rounded background and overflow masks. When enabled, `LynxBackgroundManager` and UI context prefer shape-layer masks; when disabled, iOS falls back to the older mask path. This optimization is effectively fixed in newer implementations.
  defaultValue: 'true'
  valueType: bool
  author: zhongyr
  since: '2.3'
  deprecated: '3.5'
  supportPlatform:
    - iOS
compileRender:
  description: Controls the deprecated compile-render component ownership fix inside Radon components. When enabled, `RadonComponent` also rewrites plug subtrees during component reassignment; when disabled, that extra compile-render plug adjustment is skipped.
  defaultValue: 'false'
  valueType: bool
  author: DragonDragonDDD
  deprecated: '3.5'
enableTextLanguageAlignment:
  description: Controls whether iOS rich text chooses natural alignment using the text language aware algorithm. When enabled, attributed text applies language-aware natural alignment; when disabled, it keeps the older alignment heuristic.
  defaultValue: 'false'
  valueType: bool
  author: Randycn
  since: '2.8'
  supportPlatform:
    - iOS
enableXTextLayoutReused:
  description: Controls whether iOS x-text nodes reuse a prepared text layout model instead of rebuilding it for each measure. When enabled, BDX text nodes create and reuse a text model during layout; when disabled, each measure recomputes layout data.
  defaultValue: 'false'
  valueType: bool
  author: Randycn
  since: '2.9'
  supportPlatform:
    - iOS
enableRemoveComponentExtraData:
  description: Controls whether component data strips `__globalProps` and `SystemInfo` before component render and updates. When enabled, decoder and runtime omit those extra values from component data for `RadonPage` and `RadonComponent`; when disabled, components keep the older extra-data payload.
  defaultValue: 'false'
  valueType: bool
  author: nhsprite
  since: '2.7'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableExposureUIMargin:
  description: Controls whether exposure-ui-margin properties expand the area used for exposure calculation. When enabled, exposure detection uses the adjusted rectangle with UI margins; when disabled, exposure checks use the raw UI bounds.
  defaultValue: 'false'
  valueType: bool
  author: rAY-ooo
  since: '2.6'
  supportPlatform:
    - Android
    - iOS
enableNewGesture:
  description: Controls whether runtime enables the new gesture arena and handler integration instead of the legacy touch-only gesture path. When enabled, platform UI owners initialize new gesture handlers and Radon or Fiber gesture updates take the new path; when disabled, scrolling and touch handling keep the legacy behavior.
  defaultValue: 'false'
  valueType: bool
  author: AdrianLCA
  since: '2.16'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enablePlatformGesture:
  description: Controls whether Lynx sets up the platform-gesture bridge for gesture-conflict handling. When enabled, the event handler installs custom platform gestures and delegates; when disabled, that platform-gesture layer is removed.
  defaultValue: 'false'
  valueType: bool
  since: '3.6'
  author: AdrianLCA
  supportPlatform:
    - Android
    - iOS
enableHarmonyNewOverlay:
  description: Controls whether Harmony overlay components use the newer overlayManager-based overlay path. When enabled, Harmony overlays are shown and removed through overlayManager so pass-through event handling can work; when disabled, overlays keep the legacy path.
  defaultValue: 'false'
  valueType: bool
  since: '3.6'
  author: AdrianLCA
  supportPlatform:
    - HarmonyOS
enableCheckLocalImage:
  description: Controls whether Android image loading checks local-resource URLs before applying redirect handling. When enabled, page config forwards the local-image check flag to Android image code so local resources can choose the correct redirect path; when disabled, that extra local-resource check is bypassed.
  defaultValue: 'true'
  valueType: bool
  author: liubb0516
  since: '2.8'
  supportPlatform:
    - Android
enableAsyncRequestImage:
  description: Controls whether Android page config exposes the async image-request scheduling flag to `LynxContext`. When enabled, platform image code can start requests from an async worker path; when disabled, image requests keep the normal request-start flow.
  defaultValue: 'false'
  valueType: bool
  author: liubb0516
  since: '2.12'
  supportPlatform:
    - Android
enableComponentNullProp:
  description: Controls whether LepusNG component props preserve explicit `null` values instead of dropping them during property application. When enabled, page proxy and `RadonComponent` allow `null` props through the LepusNG component path; when disabled, component props keep the older non-null-only behavior.
  defaultValue: 'false'
  valueType: bool
  author: nhsprite
  since: '2.9'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableCascadePseudo:
  description: Deprecated, this is for legacy CSS selector to enable a cascading.
  defaultValue: 'false'
  valueType: bool
  author: zhongyr
  since: '2.1'
  deprecated: '3.5'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
autoExpose:
  description: Controls whether page attach and detach automatically drive page-level `onShow` and `onHide` exposure lifecycle. When enabled, platform template renders trigger show or hide during `attachToView` and `detachFromWindow`; when disabled, those lifecycle callbacks only run through explicit exposure flows.
  defaultValue: 'true'
  valueType: bool
  nameAs:
    member: enable_auto_show_hide
  author: nhsprite
  since: '2.1'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
disableQuickTracingGC:
  description: Disable tracing gc mode in quick context.
  defaultValue: 'false'
  valueType: bool
  author: zys777
  since: '3.2'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
fixCSSImportRuleOrder:
  description: Controls the deprecated CSS import-flattening order used when the binary reader expands `@import` dependencies. When enabled, `CSSStyleSheetManager::FlatDependentCSS()` preserves the newer forward import order; when disabled, imported sheets are flattened in the older reverse order.
  defaultValue: 'true'
  valueType: bool
  author: linxs0211
  since: '3.1'
  deprecated: '3.5'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableReloadLifecycle:
  description: Controls whether reload patching triggers the LynxUI onNodeReload lifecycle on affected elements. When enabled, refresh patching walks reloaded elements and calls onNodeReload; when disabled, reload updates skip that lifecycle callback.
  defaultValue: 'false'
  valueType: bool
  author: nhsprite
  since: '2.17'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableA11y:
  description: Controls whether Android turns on the helper-based Lynx accessibility path for the page. When enabled, LynxAccessibilityWrapper initializes the accessibility helper and a11y-id based lookup path; when disabled, runtime falls back to the default or delegate-based accessibility behavior.
  defaultValue: 'false'
  valueType: bool
  author: DwwWxx
  since: '2.12'
  supportPlatform:
    - Android
enableA11yIDMutationObserver:
  description: Controls the deprecated accessibility mutation-observer path for accessibility-id changes. When enabled, Android and iOS accessibility wrappers watch node mutations and refresh accessibility state when relevant ids or structure change; when disabled, those mutation observers are not installed.
  defaultValue: 'false'
  valueType: bool
  author: MoonfaceX
  nameAs:
    member: enable_a11y_mutation_observer
  since: '2.18'
  deprecated: '3.5'
enableCheckExposureOptimize:
  description: Controls whether iOS exposure detection skips repeated checks while the page stays static. When enabled, the exposure observer returns early until UI movement marks the page dirty again; when disabled, exposure checks continue on the normal cadence.
  defaultValue: 'false'
  valueType: bool
  author: rAY-ooo
  since: '2.10'
  supportPlatform:
    - iOS
enableDisexposureWhenLynxHidden:
  description: Controls whether Android sends `disexposure` events when `LynxView` becomes hidden without leaving the window. When enabled, `LynxObserverManager` and `UIExposure` emit `disexposure` for views hidden by visibility changes; when disabled, hiding the page does not force that extra event.
  defaultValue: 'true'
  valueType: bool
  author: rAY-ooo
  since: '2.10'
  supportPlatform:
    - Android
enableExposureWhenLayout:
  description: Controls whether Android runs exposure checks when LynxView requests layout. When enabled, layout requests can trigger exposure detection; when disabled, exposure checks wait for the normal exposure flow.
  defaultValue: 'false'
  valueType: bool
  author: ShouruiSong
  since: '2.10'
  supportPlatform:
    - Android
enableExposureWhenReload:
  description: Controls whether reload flows emit exposure or disexposure transitions for the old and new page state. When enabled, Android, iOS, and Harmony reload paths send `disexposure` before reload and can re-run exposure after reload init; when disabled, reload does not trigger that extra exposure cycle.
  defaultValue: 'false'
  valueType: bool
  syncTo:
    - platform
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
  since: '3.5'
  author: rAY-ooo
enableAirDetectRemovedKeysWhenUpdateData:
  description: Controls whether TTML strict-mode reloads mark removed data keys as `undefined` during page-data reset or template reload. When enabled, renderer functions explicitly set keys missing from the new payload to `undefined`; when disabled, removed keys keep the older absence-handling behavior.
  defaultValue: 'false'
  valueType: bool
  author: liulixplor
  since: '2.14'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
  export: false
enableJSDataProcessor:
  description: Controls whether Fiber pages run the data-processor flow on the JS thread instead of completing it during normal decode. When enabled, TemplateAssembler posts JS earlier and processes template data through the JS-thread processor path; when disabled, data processing stays on the regular decode side.
  defaultValue: 'false'
  valueType: bool
  author: ShouruiSong
  nameAs:
    member: enable_data_processor_on_js
    setter: SetEnableDataProcessorOnJs
    getter: GetEnableDataProcessorOnJs
  since: '2.12'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableJsBindingApiThrowException:
  description: Controls whether JS binding APIs surface binding failures as JS exceptions. When enabled, the runtime bundle turns on throw-exception behavior for JSI bindings; when disabled, bindings keep the older non-throwing behavior.
  defaultValue: 'false'
  valueType: bool
  versionOverrides:
    - minSDKVersion: LYNX_VERSION_2_14
      value: 'true'
  author: lybvinci
  since: '2.14'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableICU:
  description: Controls whether the runtime binds PRIMJS ICU support into the JS environment. When enabled, TemplateEntry and BTS runtime install ICU bindings when the context supports them; when disabled, the JS environment runs without those ICU bindings.
  defaultValue: 'false'
  valueType: bool
  syncTo:
    - script
  author: OverWatch-Winder
  nameAs:
    member: enable_bind_icu
    setter: SetEnableBindICU
    getter: GetEnableBindICU
    const: kEnableBindICU
  since: '2.16'
  supportPlatform:
    - Android
    - iOS
enableQueryComponentSync:
  description: Controls whether background runtime can query dynamic components synchronously. When enabled, page config passes a synchronous-query flag into TemplateEntryHolder and JS bundle holders; when disabled, component queries stay asynchronous.
  defaultValue: 'false'
  valueType: bool
  author: nhsprite
  since: '2.14'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableAsyncResolveSubtree:
  description:
    FE Framework use this config to notify Engine that resolve subtree
    binding will be triggered when render DOM (Not exposed to normal user)
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  author: usczz
  nameAs:
    const: kEnableAsyncFlushSubtree
  since: '3.4'
  supportPlatform:
    - Android
    - iOS
absoluteInContentBound:
  description:
    When set to true, the containing block of absolute/fixed elements is
    the content area; otherwise, it is the padding area
  defaultValue: 'false'
  valueType: bool
  bindMemberTo: layout_configs_.is_absolute_in_content_bound_
  codeGen:
    - SETTER
    - GETTER
    - DECODE
  author: givemefive9
  since: '1.4'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableFixedNew:
  description: A better and stable position fixed handling.
  defaultValue: 'false'
  valueType: bool
  bindMemberTo: layout_configs_.enable_fixed_new_
  codeGen:
    - SETTER
    - GETTER
    - DECODE
  readSettings: true
  author: zhongyr
  since: '2.10'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableCSSInheritance:
  description: Controls whether the style system applies the CSS inheritance path during style propagation. When enabled, Fiber style propagation and inherited-property updates respect CSS inheritance; when disabled, inherited style propagation stays off.
  defaultValue: 'false'
  valueType: bool
  bindMemberTo: css_configs_.enable_css_inheritance_
  codeGen:
    - SETTER
    - GETTER
    - DECODE
  author: ShouruiSong
  since: '1.6'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
CSSAlignWithLegacyW3C:
  description:
    When set to true, for compatibility, some layout behaviors are consistent
    with the previous incorrect behaviors.
  defaultValue: 'false'
  valueType: bool
  codeGen:
    - MEMBER
    - DECODE
  author: givemefive9
  since: '1.4'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
unifyVWVHBehavior:
  description: Controls whether `vw` and `vh` values use the unified viewport calculation path across layout and dynamic style updates. When enabled, Fiber elements and dynamic CSS updates recompute viewport units from the current viewport consistently; when disabled, some properties keep the older behavior. From target SDK 2.3 onward, the default override is enabled.
  defaultValue: 'false'
  valueType: bool
  versionOverrides:
    - minSDKVersion: LYNX_VERSION_2_3
      value: 'true'
  codeGen:
    - SETTER
    - GETTER
    - DECODE
  nameAs:
    setter: SetUnifyVWVH
    getter: GetUnifyVWVH
  bindMemberTo: css_configs_.unify_vw_vh_behavior_
  author: givemefive9
  since: '2.3'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
fontScaleEffectiveOnlyOnSp:
  description: Make font scale only apply to sp units.
  defaultValue: 'false'
  valueType: bool
  bindMemberTo: layout_configs_.font_scale_sp_only_
  codeGen:
    - SETTER
    - GETTER
    - DECODE
  nameAs:
    setter: SetFontScaleSpOnly
    getter: GetFontScaleSpOnly
  author: Randycn
  since: '2.4'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableNewIntersectionObserver:
  description: Controls whether intersection observers use the newer detection logic instead of the older scroll-bound path. When enabled, intersection managers add observers to the dedicated run loop and observe without depending on scroll-event binding; when disabled, runtime keeps the legacy observer logic. When unset, settings can still decide the flag.
  defaultValue: 'true'
  valueType: bool
  readSettings: true
  author: rAY-ooo
  since: '2.8'
  supportPlatform:
    - Android
    - iOS
forceCalcNewStyle:
  description: Controls the deprecated page-level fallback for forcing Radon style recalculation on updates. When the newer compiler option is unset, manual config decode still reads this flag and `RadonNode` can recalculate styles instead of using the incremental style-invalidation path.
  defaultValue: 'true'
  valueType: bool
  codeGen:
    - SETTER
    - GETTER
    - MEMBER
  nameAs:
    const: kForceCalcNewStyleKey
  author: DragonDragonDDD
  deprecated: '3.5'
enableParseIntFlex:
  description: Preserve integer values for numeric flex inputs in CSS parser.
  defaultValue: 'false'
  valueType: bool
  readSettings: true
  author: ShouruiSong
  since: '3.8'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableGridPlacementShorthands:
  description: Controls whether the CSS parser accepts grid-column and grid-row shorthand syntax. When enabled, grid shorthand handlers parse placement shorthands into style values; when disabled, those shorthand declarations are rejected.
  defaultValue: 'false'
  valueType: bool
  author: renzhongyue
  since: '3.9'
enableFlexBasisZeroPercent:
  description: When enabled, flex-basis defaults to 0% instead of 0 when omitted in flex shorthand, matching web browser behavior.
  defaultValue: 'false'
  valueType: bool
  author: renzhongyue
  since: '3.8'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
includeFontPadding:
  description: Controls whether Android text measurement includes the font's top and bottom padding. When enabled, page config forwards `includeFontPadding` to text shadow nodes and text height or vertical centering includes font padding; when disabled, text metrics exclude that padding. When omitted, Android falls back to the historical SDK-based default (`true` for 2.4 <= target SDK < 2.9).
  defaultValue: 'false'
  valueType: bool
  codeGen:
    - DECODE
  author: Randycn
  since: '2.4'
  supportPlatform:
    - Android
enableCSSRule:
  description: When enabled, CSS supports unified rules.
  defaultValue: 'false'
  valueType: bool
  author: baiqiang
  since: '4.0'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
removeDescendantSelectorScope:
  description: Controls whether descendant selectors are allowed to cross component scope boundaries during style resolution. When enabled, `AttributeHolder` and `StyleResolver` stop constraining descendant selectors to the current component scope; when disabled, descendant selectors only match inside the component scope. In Fiber, manual decode keeps the default off unless explicitly set.
  defaultValue: 'true'
  valueType: bool
  syncTo:
    - script
  codeGen:
    - MEMBER
    - SETTER
    - GETTER
  author: linxs0211
  since: '2.0'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableMultiTouch:
  description: Controls whether Lynx touch events carry multi-finger state instead of collapsing to single-touch behavior. When enabled, touch events include information for multiple active fingers; when disabled, runtime keeps the single-touch event model.
  defaultValue: 'false'
  valueType: bool
  author: rAY-ooo
  readSettings: true
  since: '2.14'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableMultiTouchParamsCompatible:
  description: Controls how multi-touch events populate touches and changedTouches when compatibility with single-touch payloads is needed. When enabled, multi-touch cancel and payload generation keep single-touch compatible fields; when disabled, multi-touch events use the newer native multi-touch parameter shape.
  defaultValue: 'false'
  valueType: bool
  codeGen:
    - MEMBER
    - SETTER
    - GETTER
  author: rAY-ooo
  since: '3.2'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableHarmonyVisibleAreaChangeForExposure:
  description: Controls whether Harmony exposure detection also tracks the root visible-area-change signal. When enabled, Harmony root visibility depends on the visible-area-change event before exposure is reported; when disabled, exposure only uses the normal visibility checks.
  defaultValue: 'false'
  valueType: bool
  author: rAY-ooo
  since: '3.4'
  supportPlatform:
    - HarmonyOS
enableTextGradientOpt:
  description: Controls whether iOS text rendering turns on the gradient optimization path. When enabled, LynxUIText records the experiment flag and uses the optimized gradient text path; when disabled, text gradients stay on the legacy rendering flow. When unset, it falls back to external settings or native config.
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  readSettings: false
  syncTo:
    - platform
  author: zhongyr
  readNative: true
  since: '3.5'
  supportPlatform:
    - iOS
enableEventHandleRefactor:
  description: Controls whether runtime uses the refactored event-listener and dispatch path. When enabled, element decode, Radon event processing, and touch dispatch use the newer listener registration flow that supports rebinding and interception; when disabled, runtime stays on the legacy event hookup path. If the field is omitted, decoder falls back to the settings source.
  defaultValue: 'false'
  valueType: bool
  since: '3.5'
  readSettings: true
  author: rAY-ooo
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableReuseLoadScriptExports:
  description: Controls whether `loadScript` can reuse cached module exports for the same template URL and path. When enabled, TemplateEntry passes the flag into the JS app runtime and repeated `loadScript` calls can reuse prior exports; when disabled, the cache key is not created and each load runs fresh.
  defaultValue: 'false'
  valueType: bool
  syncTo:
    - script
  author: lybvinci
  since: '3.5'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableCSSInlineVariables:
  description: Controls whether runtime treats inline style values as CSS variables and resolves them through the inline-variable path. When enabled, decoded page config turns on inline CSS variable support for runtime CSS readers and style resolution; when disabled, inline style values are handled as ordinary static styles. If the field is omitted, the setting can still be driven by native or settings fallback.
  defaultValue: 'false'
  valueType: bool
  readSettings: true
  readNative: true
  bindMemberTo: css_configs_.enable_css_inline_variables_
  codeGen:
    - SETTER
    - GETTER
    - DECODE
  author: 'pilipala195'
  since: '3.6'
enableMTSPreExecute:
  description: Controls whether pooled LepusNG MTS runtimes pre-execute their context before the page claims them. When enabled, MTSRuntimePool initializes debug tooling, deserializes the bundle, and calls `TryExecute()` during pool fill; when disabled, pooled contexts wait until normal runtime use to execute.
  defaultValue: 'false'
  valueType: bool
  author: 'lybvinci'
  since: '3.7'
enablePropertyBasedSimpleStyle:
  description: SimpleStyle mode will incrementally update styles based on properties if this config set to TRUE. Otherwise it will incrementally update based on StyleObjects. The StyleObject based updating has a better performance but not allow StyleObjects bound to the same element has intersect properties.
  defaultValue: 'false'
  valueType: bool
  readSettings: false
  readNative: false
  author: 'zhongyr'
  since: '3.5'
enableUnifyFixedBehavior:
  description: Unify behavior between old-fixed and new-fixed
  defaultValue: 'false'
  valueType: bool
  bindMemberTo: layout_configs_.enable_unify_fixed_behavior_
  codeGen:
    - SETTER
    - GETTER
    - DECODE
  readSettings: true
  readNative: true
  author: usczz
  since: '3.7'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableTransformedTouchPosition:
  description: Make the touch point coordinates of Lynx or Canvas's TouchEvent to take into account the transformation.
  defaultValue: 'false'
  valueType: bool
  author: rAY-ooo
  since: '3.6'
  supportPlatform:
    - Android
    - HarmonyOS
enableBatchLayoutTaskWithSyncLayout:
  description: Controls whether Fiber elements batch layout tasks and flush them together during sync layout. When enabled, layout work is enqueued on the element context delegate and flushed at sync-layout boundaries; when disabled, layout tasks run immediately. When omitted, it falls back to settings or native config.
  defaultValue: 'false'
  valueType: bool
  readSettings: true
  readNative: true
  author: usczz
  since: '3.7'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableiOSAnimationLayerForExposure:
  description: Controls whether iOS exposure position calculations include animation-layer geometry instead of only the base view frame. When enabled, exposure detection measures visibility using animation-layer positions; when disabled, it uses the normal layer position.
  defaultValue: 'false'
  valueType: bool
  author: rAY-ooo
  since: '3.6'
  supportPlatform:
    - iOS
enableFetchAPIStandardStreaming:
  description: Make the Lynx Fetch-API support standard http streaming
  defaultValue: TernaryBool::UNDEFINE_VALUE
  valueType: TernaryBool
  readSettings: false
  readNative: true
  author: 'Zhangpcplus'
  since: '3.7'
  supportPlatform:
    - Android
    - iOS
alignMouseEventWithW3C:
  description: Let mouse events have the same semantic with W3C standard
  defaultValue: 'false'
  valueType: bool
  author: panchenfeng
  since: '3.8'
  supportPlatform:
    - macOS
    - Windows
enableDisexposureWhenBackground:
  description: Controls whether iOS sends `disexposure` events when the Lynx view enters the background. When enabled, `LynxUIExposure` emits `disexposure` during background transitions; when disabled, backgrounding does not trigger that extra event.
  defaultValue: 'true'
  valueType: bool
  author: rAY-ooo
  since: '3.8'
  supportPlatform:
    - iOS
enableAnimationForwardUpdatePreservation:
  description: Controls whether Fiber keeps animation override styles while forward updates apply new styles. When enabled, animation fill or override styles are preserved across forward updates; when disabled, forward updates can drop those animation-preserved styles. When omitted, it falls back to settings or native config.
  defaultValue: 'false'
  valueType: bool
  readSettings: true
  readNative: true
  author: usczz
  since: '3.8'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableNewStylingPipeline:
  description: Controls whether Fiber elements use the new styling resolution pipeline instead of the legacy style resolver path. When enabled, ElementManager turns on the new styling flag and FiberElement switches to `ResolveCSSStylesNewPipeline`; when disabled, style resolution stays on the existing pipeline. If the field is omitted, native or settings fallback can still decide the flag.
  defaultValue: 'false'
  valueType: bool
  readSettings: true
  readNative: true
  author: zhouzhitao
  since: '3.9'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
enableDispatchCustomEventForUI:
  description: Controls whether custom events can be dispatched directly to a `LynxUI` target instead of only bubbling through the page delegate. When enabled, iOS event dispatch resolves the target UI by sign and calls `dispatchEvent:` on it; when disabled, custom events stay on the normal page-level callback path.
  defaultValue: 'false'
  valueType: bool
  author: rAY-ooo
  since: '3.9'
  supportPlatform:
    - iOS
    - Android
enableFrameNativeData:
  description: Controls whether `<frame>` data and global-props are transferred through native lepus value pointers instead of the legacy platform map path. When enabled, Android and iOS consume the native pointer to build TemplateData; when disabled, frame data and global props continue to be delivered as platform maps.
  defaultValue: 'false'
  valueType: bool
  readSettings: true
  author: 'pilipala195'
  since: '3.8'
  supportPlatform:
    - Android
    - iOS
syncXElementRegistry:
  description: Controls whether runtime synchronizes the XElement registry during page setup. When enabled, XElement registrations can be synced into the page behavior registry; when disabled, that registry sync is skipped.
  defaultValue: 'false'
  valueType: bool
  author: moonface
  since: '4.0'
  supportPlatform:
    - Android
    - HarmonyOS
    - iOS
  export: false
